name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # R1 (SLS-28): the numpy port + MPC service consume constants generated
      # from the TS physics core. Fail if a constant changed but the generated
      # rl_consts.json was not regenerated + committed.
      - name: Physics constants single-sourced (R1)
        run: pnpm gen:consts:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage gate)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      # SLS-28 / R1: the golden parity fixtures are generated from the TS
      # physics. Regenerate and fail on any diff, so a TS *equation* change
      # can't silently leave the numpy port validating against stale goldens.
      # (Constant drift is caught earlier by `gen:consts:check`.)
      - name: Parity fixtures freshness check
        run: |
          pnpm gen:parity-fixtures
          git diff --exit-code services/rl/tests/fixtures \
            || (echo "::error::parity fixtures stale — run pnpm gen:parity-fixtures and commit" && exit 1)

      - name: Eval matrix (quick)
        run: pnpm eval:all --quick

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-reports
          path: eval/results/
          retention-days: 7

  mpc:
    name: MPC service (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: services/mpc/uv.lock

      - name: Sync dependencies
        working-directory: services/mpc
        run: uv sync --frozen

      - name: Ruff
        working-directory: services/mpc
        run: uv run ruff check .

      - name: Pytest
        working-directory: services/mpc
        run: uv run pytest -q

  rl:
    name: RL env + numpy parity (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: services/rl/uv.lock

      - name: Sync dependencies
        working-directory: services/rl
        run: uv sync --frozen

      - name: Ruff
        working-directory: services/rl
        run: uv run ruff check .

      # Runs the numpy↔TS snapshot-equivalence suite (< 1e-4 over 1 s) against
      # the committed golden fixtures + the reward-sign tests (SLS-28 / R1).
      - name: Pytest
        working-directory: services/rl
        run: uv run pytest -q

  e2e:
    name: e2e (Playwright / Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('./apps/web/node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright Chromium (with system deps)
        run: pnpm playwright:install

      - name: Build web app
        # Match the public deploy config (no guidance service) so the e2e
        # suite validates the MPC graceful-degradation path — SLS-49.
        env:
          VITE_MPC_URL: ""
        run: pnpm --filter @starship-catch-sim/web build

      - name: Run Playwright smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
